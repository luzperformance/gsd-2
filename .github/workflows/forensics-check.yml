# Project/App: GSD-2
# File Purpose: Close legacy /gsd forensics issues with an Open GSD redirect.

name: Forensics Check

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

concurrency:
  group: legacy-forensics-redirect-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  redirect-legacy-forensics:
    name: Redirect legacy forensics issues
    if: ${{ github.event_name == 'issues' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Redirect legacy forensics issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/legacy-forensics-redirect.mjs
